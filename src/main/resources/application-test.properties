# ================= TEST =================

# PLATFORM DB
spring.datasource.url=jdbc:postgresql://localhost:5432/tenantdb_test
spring.datasource.username=postgres
spring.datasource.password=postgres

# ARTIS DB
artis.datasource.url=jdbc:postgresql://localhost:5432/artisdb_test
artis.datasource.username=postgres
artis.datasource.password=postgres

# Keycloak
keycloak.server-url=http://localhost:8080
keycloak.admin-realm=master
keycloak.client-id=artis-provisioner
keycloak.client-secret=test-secret

# Paymee sandbox
paymee.api-key=TEST_KEY
paymee.api-token=TEST_TOKEN
paymee.base-url=https://sandbox.paymee.tn/api/v2

paymee.public-base-url=https://test.ngrok-free.dev
paymee.return-url-success=https://test.ngrok-free.dev/api/payment/redirect-success
paymee.return-url-fail=https://test.ngrok-free.dev/api/payment/redirect-cancel
paymee.webhook-url=https://test.ngrok-free.dev/api/payment/webhook

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Frontend
app.frontend.url=http://localhost:4200

# Faster retry for tests
provisioning.max-attempts=1
provisioning.retry-delay-ms=5000