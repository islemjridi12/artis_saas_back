# ============================================================================
# Secret partage entre saas-platform et le pipeline Argo
# ----------------------------------------------------------------------------
# La meme valeur doit etre :
#   - injectee dans le pod saas-platform comme APP_INTERNAL_SECRET
#   - lue par le step "notify" du workflow Argo et envoyee dans le header
#
# En prod : generer une valeur aleatoire forte (openssl rand -hex 32)
# ============================================================================

# Secret dans le namespace "artis" (pour saas-platform)
apiVersion: v1
kind: Secret
metadata:
  name: internal-api-secret
  namespace: artis
type: Opaque
stringData:
  # CHANGE-ME-IN-PROD : valeur de 64 caracteres hexa minimum
  secret: "dev-secret-change-me-please-abc123xyz789"
---
# Meme Secret dans le namespace "argo" (pour le workflow)
apiVersion: v1
kind: Secret
metadata:
  name: internal-api-secret
  namespace: argo
type: Opaque
stringData:
  secret: "dev-secret-change-me-please-abc123xyz789"