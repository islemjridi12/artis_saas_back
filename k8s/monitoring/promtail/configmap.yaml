apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        pipeline_stages:
          - docker: {}
          - match:
              selector: '{job="kubernetes-pods"}'
              stages:
                - regex:
                    expression: '^(?P<namespace>[^/]+)/(?P<pod>[^/]+)/(?P<container>[^/]+)/'
                    source: filename
                - labels:
                    namespace:
                    pod:
                    container:
        static_configs:
          - labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*log
