apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      - job_name: 'saas-platform'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['saas-platform.artis.svc.cluster.local:8081']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'saas-platform'

      - job_name: 'postgresql'
        static_configs:
          - targets: ['postgres-exporter.monitoring.svc.cluster.local:9187']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'postgresql'

      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq.artis.svc.cluster.local:15692']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'rabbitmq'

      - job_name: 'argo-server'
        static_configs:
          - targets: ['argo-server.argo.svc.cluster.local:2746']
        tls_config:
          insecure_skip_verify: true
        scheme: https
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'argo-server'
