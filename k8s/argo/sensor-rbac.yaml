# ============================================================================
# RBAC pour que le Sensor (namespace argo-events) puisse creer des Workflow
# dans le namespace argo (ou tourne Argo Workflows).
# ============================================================================

# 1. ServiceAccount dans argo-events (utilise par le Sensor)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
  namespace: argo-events
---
# 2. Role dans le namespace argo (permet CRUD sur Workflow)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operate-workflow-role
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
# 3. RoleBinding : lie le ServiceAccount (argo-events) au Role (argo)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operate-workflow-rb
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: argo-events     # Le SA est dans argo-events
roleRef:
  kind: Role
  name: operate-workflow-role
  apiGroup: rbac.authorization.k8s.io