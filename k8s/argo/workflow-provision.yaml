apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-tenant
  namespace: argo
spec:
  entrypoint: provision
  arguments:
    parameters:
      - name: tenantDomain
        value: ""
      - name: accountType
        value: "DEMO"
      - name: adminEmail
        value: ""
      - name: adminPassword
        value: ""
      - name: organizationName
        value: ""
      - name: plan
        value: "BASIC"

  templates:
    - name: provision
      steps:
        - - name: create-keycloak
            template: keycloak-step
        - - name: create-schema
            template: atlas-schema-step
        - - name: run-migrations
            template: atlas-migrate-step
        - - name: notify
            template: notify-step

    - name: keycloak-step
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            echo "Creating Keycloak realm for {{workflow.parameters.tenantDomain}}"
            curl -s -o /dev/null -w "%{http_code}" \
              http://saas-platform.artis.svc.cluster.local:8081/api/internal/keycloak/provision \
              -H "Content-Type: application/json" \
              -d "{\"domain\":\"{{workflow.parameters.tenantDomain}}\"}"

    - name: atlas-schema-step
      container:
        image: arigaio/atlas:latest
        command: [sh, -c]
        args:
          - |
            atlas schema apply \
              --url "postgres://postgres:postgres@postgresql.artis.svc.cluster.local:5432/artisdb?search_path={{workflow.parameters.tenantDomain}}&sslmode=disable" \
              --to "file:///migrations/schema.hcl" \
              --auto-approve
        volumeMounts:
          - name: migrations
            mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: atlas-migrations

    - name: atlas-migrate-step
      container:
        image: arigaio/atlas:latest
        command: [sh, -c]
        args:
          - |
            atlas migrate apply \
              --url "postgres://postgres:postgres@postgresql.artis.svc.cluster.local:5432/artisdb?search_path={{workflow.parameters.tenantDomain}}&sslmode=disable" \
              --dir "file:///migrations"
        volumeMounts:
          - name: migrations
            mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: atlas-migrations

    - name: notify-step
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            echo "Notifying saas-platform for {{workflow.parameters.tenantDomain}}"
            curl -s -X POST \
              http://saas-platform.artis.svc.cluster.local:8081/api/internal/provisioning/complete \
              -H "Content-Type: application/json" \
              -d "{\"domain\":\"{{workflow.parameters.tenantDomain}}\",\"status\":\"SUCCESS\"}"