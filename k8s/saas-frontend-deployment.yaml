apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-frontend
  namespace: artis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saas-frontend
  template:
    metadata:
      labels:
        app: saas-frontend
    spec:
      containers:
        - name: saas-frontend
          image: artis/saas-frontend:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: saas-frontend
  namespace: artis
spec:
  type: LoadBalancer
  selector:
    app: saas-frontend
  ports:
    - port: 80
      targetPort: 80